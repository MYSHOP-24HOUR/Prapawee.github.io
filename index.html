<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PP bunny</title>

<link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;600&family=Kanit:wght@400;500;600&display=swap" rel="stylesheet">

<style>

/* Animation */
@keyframes fadeUp{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

body{
  margin:0;
  background:linear-gradient(
    180deg,
    #fff0f6 0%,
    #ffe4ee 45%,
    #ffd9e8 75%,
    #fff7fb 100%
  );
  background-attachment:fixed;
  font-family:'Kanit',sans-serif;
  text-align:center;
  animation:fadeUp .7s ease;
}

body::before{
  content:"";
  position:fixed;
  width:340px;
  height:340px;
  background:#ffc2da;
  filter:blur(140px);
  top:-120px;
  left:-120px;
  z-index:-1;
}

/* Navbar */
.navbar{
  position:sticky;
  top:0;
  padding:15px;
  background:rgba(255,255,255,.65);
  backdrop-filter:blur(15px);
  font-family:'Mali',cursive;
  font-weight:600;
  color:#ff6fa5;
  box-shadow:0 3px 12px rgba(0,0,0,.08);
}

.container{
  max-width:420px;
  margin:auto;
  padding:30px 20px;
}

.logo{
  width:120px;
  height:120px;
  border-radius:50%;
  object-fit:cover;
  margin-bottom:15px;
  box-shadow:0 10px 25px rgba(0,0,0,.15);
  transition:.3s;
}

.logo:hover{transform:scale(1.05);}

h1{
  color:#ff6fa5;
  font-family:'Mali',cursive;
}

.button{
  display:block;
  margin:14px 0;
  padding:16px;
  border-radius:22px;
  text-decoration:none;
  color:#ff6fa5;
  font-weight:500;
  background:rgba(255,255,255,0.9);
  box-shadow:0 4px 12px rgba(0,0,0,.12);
  transition:.25s;
}

.button:hover{transform:translateY(-3px);}
.button:active{transform:scale(.95);}

/* Product Scroll */
.product-scroll{
  display:flex;
  overflow-x:auto;
  gap:18px;
  padding:18px 6px;
  scroll-snap-type:x mandatory;
}

.product-scroll::-webkit-scrollbar{display:none;}

.card-link{text-decoration:none;color:inherit;}

.product-card{
  min-width:230px;
  background:white;
  border-radius:24px;
  padding:15px;
  scroll-snap-align:center;
  box-shadow:0 10px 25px rgba(0,0,0,.12);
  transition:.3s;
}

.product-card:hover{transform:translateY(-8px);}

.product-card img{
  width:100%;
  border-radius:16px;
}

.product-card h3{
  color:#ff6fa5;
  font-family:'Mali',cursive;
}

.footer{
  margin-top:40px;
  padding:25px;
  font-size:14px;
  color:#777;
}

</style>
</head>

<body>

<div class="navbar">PP bunny</div>

<div class="container">

<img class="logo" src="IMG_1684.jpeg" alt="logo">

<h1>สนใจสินค้า สอบถามเพิ่มเติมได้นะคะ</h1>

<a class="button" href="product1.html">ตัวอย่างโน้ต iPhone/iPad</a>
<a class="button" href="product2.html">ตัวอย่างสติกเกอร์</a>

<h2 style="color:#ff6fa5;">รายการสินค้าแนะนำร้านPP bunny</h2>

<div class="product-scroll">

<a href="product1.html" class="card-link">
<div class="product-card">
<img src="IMG_1685.jpeg" alt="โน้ต">
<h3>ตัวอย่างโน้ต iPhone/iPad</h3>
</div>
</a>

<a href="product2.html" class="card-link">
<div class="product-card">
<img src="IMG_1686.jpeg" alt="สติ๊กเกอร์">
<h3>ตัวอย่างสติกเกอร์</h3>
</div>
</a>

</div>

<a class="button" href="https://www.facebook.com/share/1Hkjx2c58m/?mibextid=wwXIfr">Facebook</a>
<a class="button" href="https://line.me/ti/p/7fmAbuv6Yh">LINE</a>

<div class="footer">

</div>

</div>
</body>
</html>
